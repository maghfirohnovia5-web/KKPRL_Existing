<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS KKPRL Jawa Tengah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Leaflet Search CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.css"/>

  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }

    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    .popup-table td {
      border: 1px solid #ccc;
      padding: 4px;
    }
    .popup-table td:first-child {
      font-weight: bold;
      background: #f2f2f2;
      width: 35%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet Search -->
<script src="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.js"></script>

<script>
// ===============================
// INIT MAP
// ===============================
const map = L.map("map").setView([-6.9, 110.4], 9);

// ===============================
// BASEMAP
// ===============================
const esriSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "© Esri" }
).addTo(map);

const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "© OpenStreetMap" }
);

// ===============================
// COLOR KKPRL
// ===============================
const colorPalette = [
  "#e41a1c","#984ea3","#ff7f00",
  "#a65628","#f781bf","#999999",
  "#d95f02","#7570b3"
];

const subjectColorMap = {};
let colorIndex = 0;

function getColorBySubject(subject) {
  if (!subjectColorMap[subject]) {
    subjectColorMap[subject] = colorPalette[colorIndex % colorPalette.length];
    colorIndex++;
  }
  return subjectColorMap[subject];
}

function kkprlStyle(feature) {
  const subject = feature.properties.NAMA_SUBJ || "Tidak Diketahui";
  return {
    color: getColorBySubject(subject),
    weight: 2,
    fillOpacity: 0.6
  };
}

// ===============================
// STYLE AKRESI (BEDAIN BIAR JELAS)
// ===============================
function akresiStyle() {
  return {
    color: "#000000",
    weight: 1,
    fillColor: "#ffff00",
    fillOpacity: 0.5
  };
}

// ===============================
// POPUP
// ===============================
function onEachFeature(feature, layer) {
  const p = feature.properties;

  let content = `<table class="popup-table">`;

  for (let key in p) {
    content += `<tr><td>${key}</td><td>${p[key]}</td></tr>`;
  }

  content += `</table>`;
  layer.bindPopup(content);
}

// ===============================
// LOAD DATA (IMPORTANT FIX HERE)
// ===============================
Promise.all([
  fetch("data/kkprl_jawa.geojson").then(res => res.json()),
  fetch("data/Akresi_Joined_Fix.json").then(res => res.json()) // <-- FIXED HERE
])
.then(([kkprlData, akresiData]) => {

  // KKPRL
  const kkprlLayer = L.geoJSON(kkprlData, {
    style: kkprlStyle,
    onEachFeature: onEachFeature
  }).addTo(map);

  // AKRESI
  const akresiLayer = L.geoJSON(akresiData, {
    style: akresiStyle,
    onEachFeature: onEachFeature
  }).addTo(map);

  // FIT BOUNDS
  const group = L.featureGroup([kkprlLayer, akresiLayer]);
  map.fitBounds(group.getBounds());

  // ===============================
  // SEARCH (KKPRL ONLY)
  // ===============================
  const searchControl = new L.Control.Search({
    layer: kkprlLayer,
    propertyName: "NAMA_SUBJ",
    zoom: 14,
    marker: false
  });

  searchControl.on("search:locationfound", function(e) {
    if (e.layer._popup) {
      e.layer.openPopup();
    }
  });

  map.addControl(searchControl);

  // ===============================
  // LAYER CONTROL
  // ===============================
  const baseMaps = {
    "Satelit (Esri)": esriSat,
    "OpenStreetMap": osm
  };

  const overlayMaps = {
    "KKPRL Jawa Tengah": kkprlLayer,
    "Akresi Pantai": akresiLayer
  };

  L.control.layers(baseMaps, overlayMaps, {
    collapsed: false
  }).addTo(map);

})
.catch(err => {
  console.error(err);
  alert("Gagal load GeoJSON. Cek path & format file.");
});

</script>
</body>
</html>
