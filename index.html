<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS KKPRL Jawa Tengah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.css"/>
  <script src="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- HEADER ---- */
    #header {
      background: #1a3a5c;
      color: white;
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header .logo-icon {
      width: 32px;
      height: 32px;
      background: #2e7d9e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    #header .subtitle {
      font-size: 11px;
      color: #a0bfd4;
      margin-top: 1px;
    }
    #header .header-right {
      font-size: 12px;
      color: #a0bfd4;
    }

    /* ---- MAIN AREA ---- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- SIDEBAR ---- */
    #sidebar {
      width: 280px;
      background: #f7f9fb;
      border-right: 1px solid #dde4ec;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      z-index: 500;
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid #dde4ec;
    }
    .sidebar-section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7a91a8;
      margin-bottom: 10px;
    }

    /* Layer toggle */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .layer-item:hover { background: #e8eef5; }
    .layer-item input[type=checkbox] {
      width: 16px; height: 16px;
      accent-color: #1a3a5c;
      cursor: pointer;
    }
    .layer-swatch {
      width: 16px; height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .layer-name {
      font-size: 13px;
      color: #2c3e50;
      font-weight: 500;
    }

    /* Basemap radios */
    .basemap-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .basemap-item:hover { background: #e8eef5; }
    .basemap-item input[type=radio] {
      accent-color: #1a3a5c;
      cursor: pointer;
    }
    .basemap-name {
      font-size: 13px;
      color: #2c3e50;
    }

    /* Legend */
    #legend-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #3a4e5f;
    }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* Stats */
    .stat-row {
      display: flex;
      gap: 8px;
    }
    .stat-card {
      flex: 1;
      background: white;
      border: 1px solid #dde4ec;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1a3a5c;
    }
    .stat-label {
      font-size: 10px;
      color: #7a91a8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ---- MAP ---- */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ---- LOADING ---- */
    #loading-overlay {
      position: absolute;
      top: 54px; left: 280px;
      right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 14px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #dde4ec;
      border-top-color: #1a3a5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 13px;
      color: #7a91a8;
    }

    /* ---- POPUP ---- */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border: none;
      overflow: hidden;
      min-width: 220px;
    }
    .custom-popup .leaflet-popup-content {
      margin: 0;
      width: auto !important;
    }
    .custom-popup .leaflet-popup-tip-container {
      margin-top: -1px;
    }

    .popup-header {
      background: #1a3a5c;
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .popup-body {
      padding: 0;
    }
    .popup-row {
      display: flex;
      border-bottom: 1px solid #f0f4f8;
      font-size: 12px;
    }
    .popup-row:last-child { border-bottom: none; }
    .popup-key {
      background: #f7f9fb;
      color: #7a91a8;
      padding: 7px 10px;
      width: 38%;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      word-break: break-word;
    }
    .popup-val {
      padding: 7px 10px;
      color: #2c3e50;
      width: 62%;
      word-break: break-word;
    }

    /* Sidebar toggle for mobile */
    #sidebar-toggle {
      display: none;
      position: absolute;
      top: 64px;
      left: 10px;
      z-index: 1000;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 6px;
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 16px;
    }

    @media (max-width: 700px) {
      #sidebar { display: none; }
      #sidebar.open { display: flex; position: absolute; top: 54px; left: 0; height: calc(100vh - 54px); z-index: 999; }
      #sidebar-toggle { display: flex; align-items: center; justify-content: center; }
      #loading-overlay { left: 0; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">🗺</div>
    <div>
      <div style="font-size:15px;font-weight:600;">WebGIS KKPRL</div>
      <div class="subtitle">Kawasan Konservasi Pesisir — Jawa Tengah</div>
    </div>
  </div>
  <div class="header-right">Loka Penataan Ruang Laut Serang</div>
</div>

<button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-section-title">Statistik</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-kkprl">—</div>
          <div class="stat-label">KKPRL</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-akresi">—</div>
          <div class="stat-label">Akresi</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Layer</div>
      <label class="layer-item">
        <input type="checkbox" id="chk-kkprl" checked>
        <span class="layer-swatch" style="background:#e41a1c;"></span>
        <span class="layer-name">KKPRL</span>
      </label>
      <label class="layer-item">
        <input type="checkbox" id="chk-akresi" checked>
        <span class="layer-swatch" style="background:#f5c842;border:1px solid #bbb;"></span>
        <span class="layer-name">Akresi</span>
      </label>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Basemap</div>
      <label class="basemap-item">
        <input type="radio" name="basemap" value="satelit" checked>
        <span class="basemap-name">🛰 Satelit (Esri)</span>
      </label>
      <label class="basemap-item">
        <input type="radio" name="basemap" value="osm">
        <span class="basemap-name">🗺 OpenStreetMap</span>
      </label>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-title">Legenda KKPRL</div>
      <div id="legend-list">
        <div style="font-size:12px;color:#aaa;font-style:italic;">Memuat data...</div>
      </div>
    </div>

    <div class="sidebar-section" style="margin-top:auto;">
      <div style="font-size:11px;color:#aaa;line-height:1.6;">
        Data: LPRL Serang<br>
        Peta: Leaflet.js &amp; Esri<br>
        © 2025
      </div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Memuat data GeoJSON...</div>
</div>

<script>
const map = L.map("map").setView([-6.9, 110.4], 9);

const esriSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "© Esri" }
).addTo(map);

const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "© OpenStreetMap" }
);

// Basemap switch
document.querySelectorAll('input[name="basemap"]').forEach(radio => {
  radio.addEventListener("change", () => {
    if (radio.value === "satelit") {
      map.removeLayer(osm);
      map.addLayer(esriSat);
    } else {
      map.removeLayer(esriSat);
      map.addLayer(osm);
    }
  });
});

// Colors
const colors = ["#e41a1c","#984ea3","#ff7f00","#a65628","#f781bf","#4daf4a","#d95f02","#7570b3"];
let colorIndex = 0;
const colorMap = {};

function getColor(subject) {
  if (!colorMap[subject]) {
    colorMap[subject] = colors[colorIndex % colors.length];
    colorIndex++;
  }
  return colorMap[subject];
}

function kkprlStyle(feature) {
  const subject = feature.properties.NAMA_SUBJ || "Unknown";
  return { color: getColor(subject), weight: 2, fillOpacity: 0.55 };
}

function akresiStyle() {
  return { color: "#b8960a", weight: 1.5, fillColor: "#f5c842", fillOpacity: 0.55 };
}

// Nice popup
function buildPopup(feature, layerName) {
  const p = feature.properties;
  const keys = Object.keys(p).filter(k => p[k] !== null && p[k] !== "");
  const title = p.NAMA_SUBJ || p.NAMA || p.name || layerName;
  let html = `<div class="popup-header">${title}</div><div class="popup-body">`;
  keys.forEach(k => {
    html += `<div class="popup-row">
      <div class="popup-key">${k}</div>
      <div class="popup-val">${p[k]}</div>
    </div>`;
  });
  html += "</div>";
  return html;
}

function onEachKKPRL(feature, layer) {
  layer.bindPopup(buildPopup(feature, "KKPRL"), { className: "custom-popup", maxWidth: 320 });
  layer.on("mouseover", function() { this.setStyle({ weight: 3, fillOpacity: 0.75 }); });
  layer.on("mouseout", function() { kkprlLayer.resetStyle(this); });
}

function onEachAkresi(feature, layer) {
  layer.bindPopup(buildPopup(feature, "Akresi"), { className: "custom-popup", maxWidth: 320 });
  layer.on("mouseover", function() { this.setStyle({ weight: 3, fillOpacity: 0.75 }); });
  layer.on("mouseout", function() { akresiLayer.resetStyle(this); });
}

let kkprlLayer, akresiLayer;

Promise.all([
  fetch("data/kkprl_jawa.geojson").then(r => r.json()),
  fetch("data/Akresi_Joined_Fix.geojson").then(r => r.json())
])
.then(([kkprlData, akresiData]) => {

  document.getElementById("loading-overlay").style.display = "none";

  // Stats
  document.getElementById("stat-kkprl").textContent = kkprlData.features.length;
  document.getElementById("stat-akresi").textContent = akresiData.features.length;

  kkprlLayer = L.geoJSON(kkprlData, {
    style: kkprlStyle,
    onEachFeature: onEachKKPRL
  }).addTo(map);

  akresiLayer = L.geoJSON(akresiData, {
    style: akresiStyle,
    onEachFeature: onEachAkresi
  }).addTo(map);

  map.fitBounds(L.featureGroup([kkprlLayer, akresiLayer]).getBounds());

  // Build legend
  const legendList = document.getElementById("legend-list");
  legendList.innerHTML = "";
  Object.entries(colorMap).forEach(([name, color]) => {
    legendList.innerHTML += `
      <div class="legend-item">
        <div class="legend-swatch" style="background:${color};"></div>
        <span>${name}</span>
      </div>`;
  });
  // Akresi legend entry
  legendList.innerHTML += `
    <div class="legend-item" style="margin-top:6px;padding-top:6px;border-top:1px solid #dde4ec;">
      <div class="legend-swatch" style="background:#f5c842;"></div>
      <span>Akresi</span>
    </div>`;

  // Layer toggle
  document.getElementById("chk-kkprl").addEventListener("change", e => {
    e.target.checked ? map.addLayer(kkprlLayer) : map.removeLayer(kkprlLayer);
  });
  document.getElementById("chk-akresi").addEventListener("change", e => {
    e.target.checked ? map.addLayer(akresiLayer) : map.removeLayer(akresiLayer);
  });

  // Search
  const searchControl = new L.Control.Search({
    layer: kkprlLayer,
    propertyName: "NAMA_SUBJ",
    zoom: 14,
    marker: false,
    textPlaceholder: "Cari zona KKPRL..."
  });
  searchControl.on("search:locationfound", e => {
    if (e.layer._popup) e.layer.openPopup();
  });
  map.addControl(searchControl);

})
.catch(err => {
  document.getElementById("loading-overlay").innerHTML =
    `<div style="color:#c0392b;font-size:13px;text-align:center;">
      ❌ Gagal memuat data.<br>Periksa path file GeoJSON.<br><small>${err.message}</small>
    </div>`;
});

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}
</script>
</body>
</html>
