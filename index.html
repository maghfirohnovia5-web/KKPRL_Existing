<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS KKPRL Jawa Tengah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Search -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.css"/>
  <script src="https://unpkg.com/leaflet-search@3.0.4/dist/leaflet-search.min.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .popup-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    .popup-table td {
      border: 1px solid #ccc;
      padding: 4px;
    }
    .popup-table td:first-child {
      font-weight: bold;
      background: #f2f2f2;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
// ===============================
// INIT MAP
// ===============================
const map = L.map("map").setView([-6.9, 110.4], 9);

// ===============================
// BASEMAP
// ===============================
const esriSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "© Esri" }
).addTo(map);

const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "© OpenStreetMap" }
);

// ===============================
// STYLE KKPRL
// ===============================
const colors = ["#e41a1c","#984ea3","#ff7f00","#a65628","#f781bf","#999999","#d95f02","#7570b3"];
let colorIndex = 0;
const colorMap = {};

function getColor(subject) {
  if (!colorMap[subject]) {
    colorMap[subject] = colors[colorIndex % colors.length];
    colorIndex++;
  }
  return colorMap[subject];
}

function kkprlStyle(feature) {
  const subject = feature.properties.NAMA_SUBJ || "Unknown";
  return {
    color: getColor(subject),
    weight: 2,
    fillOpacity: 0.6
  };
}

// ===============================
// STYLE AKRESI
// ===============================
function akresiStyle() {
  return {
    color: "black",
    weight: 1,
    fillColor: "yellow",
    fillOpacity: 0.5
  };
}

// ===============================
// POPUP
// ===============================
function onEachFeature(feature, layer) {
  const p = feature.properties;
  let html = "<table class='popup-table'>";
  for (let key in p) {
    html += `<tr><td>${key}</td><td>${p[key]}</td></tr>`;
  }
  html += "</table>";
  layer.bindPopup(html);
}

// ===============================
// 🔥 FIXED PATH (.geojson)
// ===============================
const kkprlUrl = "data/kkprl_jawa.geojson";
const akresiUrl = "data/Akresi_Joined_Fix.geojson";

// ===============================
// LOAD DATA
// ===============================
Promise.all([
  fetch(kkprlUrl).then(res => res.json()),
  fetch(akresiUrl).then(res => res.json())
])
.then(([kkprlData, akresiData]) => {

  console.log("KKPRL:", kkprlData.features.length);
  console.log("AKRESI:", akresiData.features.length);

  // KKPRL layer
  const kkprlLayer = L.geoJSON(kkprlData, {
    style: kkprlStyle,
    onEachFeature: onEachFeature
  }).addTo(map);

  // Akresi layer
  const akresiLayer = L.geoJSON(akresiData, {
    style: akresiStyle,
    onEachFeature: onEachFeature
  }).addTo(map);

  // Fit bounds
  const group = L.featureGroup([kkprlLayer, akresiLayer]);
  map.fitBounds(group.getBounds());

  // Search
  const searchControl = new L.Control.Search({
    layer: kkprlLayer,
    propertyName: "NAMA_SUBJ",
    zoom: 14,
    marker: false
  });

  searchControl.on("search:locationfound", function(e) {
    if (e.layer._popup) e.layer.openPopup();
  });

  map.addControl(searchControl);

  // Layer control
  L.control.layers(
    {
      "Satelit": esriSat,
      "OpenStreetMap": osm
    },
    {
      "KKPRL": kkprlLayer,
      "Akresi": akresiLayer
    },
    { collapsed: false }
  ).addTo(map);

})
.catch(err => {
  console.error("ERROR:", err);
  alert("Gagal load data. Cek path & nama file.");
});
</script>

</body>
</html>
